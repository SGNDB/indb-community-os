name: Codex Vercel Deploy

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/codex-vercel-deploy.yml

permissions:
  contents: write

jobs:
  deploy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Check Vercel secrets
        shell: bash
        run: |
          missing=()
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -ne 0 ]; then
            echo "::error::Missing required Vercel repository secrets: ${missing[*]}"
            exit 1
          fi
      - name: Checkout fixed app source
        uses: actions/checkout@v4
        with:
          ref: c7156c5f89582fee45c0edb7ff4130727e255b5a
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel production environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - name: Build with Vercel
        run: vercel build --prod --token="$VERCEL_TOKEN"
      - name: Deploy to Vercel production
        run: |
          url="$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")"
          echo "Production URL: $url"
      - name: Checkout main for cleanup
        if: always()
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Remove temporary workflow
        if: always()
        shell: bash
        run: |
          rm -f .github/workflows/codex-vercel-deploy.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A .github/workflows/codex-vercel-deploy.yml
          git commit -m 'chore: remove temporary vercel deploy workflow' || exit 0
          git push
