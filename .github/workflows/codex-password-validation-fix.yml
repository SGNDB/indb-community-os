name: Codex password validation fix

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/codex-password-validation-fix.yml

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply localized password validation fix
        run: |
          node <<'NODE'
          const fs = require('fs');

          function read(path) {
            return fs.readFileSync(path, 'utf8');
          }

          function write(path, content) {
            fs.writeFileSync(path, content, 'utf8');
          }

          const validationPath = 'lib/validations/community.ts';
          let validation = read(validationPath)
            .replace('.regex(/[a-zA-Z]/, "password_requirements")', '.regex(/[a-zA-Z]/, "password_letter")')
            .replace('.regex(/[0-9]/, "password_requirements")', '.regex(/[0-9]/, "password_number")');
          write(validationPath, validation);

          const formPath = 'app/[locale]/(auth)/register/register-form.tsx';
          let form = read(formPath);
          const oldClientValidation = '    else if (!hasMinLen || !hasLetter || !hasNumber) nextErrors.password = errorT("password_requirements");';
          const newClientValidation = [
            '    else if (!hasMinLen) nextErrors.password = errorT("password_length");',
            '    else if (!hasLetter) nextErrors.password = errorT("password_letter");',
            '    else if (!hasNumber) nextErrors.password = errorT("password_number");',
          ].join('\n');
          if (form.includes(oldClientValidation)) {
            form = form.replace(oldClientValidation, newClientValidation);
          }
          write(formPath, form);

          const sharedFrenchPasswordErrors = {
            password_requirements: 'Le mot de passe doit contenir au moins 8 caractères, une lettre et un chiffre',
            password_letter: 'Le mot de passe doit contenir au moins une lettre',
            password_number: 'Le mot de passe doit contenir au moins un chiffre',
          };

          const localeUpdates = {
            ar: {
              errors: {
                auth_user_exists: 'يوجد حساب بهذا البريد الإلكتروني بالفعل.',
                auth_weak_password: 'كلمة المرور يجب أن تحتوي على 8 أحرف على الأقل مع حروف وأرقام',
                password_length: 'كلمة المرور يجب أن تحتوي على 8 أحرف على الأقل',
                password_requirements: 'كلمة المرور يجب أن تحتوي على 8 أحرف على الأقل، وحرف واحد، ورقم واحد',
                password_letter: 'كلمة المرور يجب أن تحتوي على حرف واحد على الأقل',
                password_number: 'كلمة المرور يجب أن تحتوي على رقم واحد على الأقل',
                password_mismatch: 'كلمتا المرور غير متطابقتين',
                username_taken: 'اسم المستخدم هذا مستخدم بالفعل',
                incorrect_password: 'كلمة المرور غير صحيحة',
                account_not_found: 'لم يتم العثور على حساب بهذا البريد الإلكتروني',
                email_required: 'البريد الإلكتروني مطلوب',
                password_required: 'كلمة المرور مطلوبة',
                username_required: 'اسم المستخدم مطلوب',
                full_name_required: 'الاسم الكامل مطلوب',
                confirm_password_required: 'يرجى تأكيد كلمة المرور',
              },
              validation: {
                password_mismatch: 'كلمتا المرور غير متطابقتين',
              },
            },
            en: {
              errors: {
                password_requirements: 'Password must be at least 8 characters and contain at least one letter and one number',
                password_letter: 'Password must contain at least one letter',
                password_number: 'Password must contain at least one number',
              },
            },
            fr: {errors: sharedFrenchPasswordErrors},
            ff: {errors: sharedFrenchPasswordErrors},
            snk: {errors: sharedFrenchPasswordErrors},
            wo: {errors: sharedFrenchPasswordErrors},
          };

          for (const [locale, update] of Object.entries(localeUpdates)) {
            const path = `messages/${locale}.json`;
            const data = JSON.parse(read(path));
            Object.assign(data.Auth.errors, update.errors);
            if (update.validation) Object.assign(data.Auth.validation, update.validation);
            write(path, `${JSON.stringify(data, null, 2)}\n`);
          }
          NODE
      - name: Verify localized password messages
        run: |
          node <<'NODE'
          const fs = require('fs');
          const locales = ['ar', 'fr', 'en', 'ff', 'snk', 'wo'];
          const required = ['password_length', 'password_letter', 'password_number', 'password_mismatch'];
          for (const locale of locales) {
            const data = JSON.parse(fs.readFileSync(`messages/${locale}.json`, 'utf8'));
            for (const key of required) {
              if (!data.Auth.errors[key]) throw new Error(`${locale} missing Auth.errors.${key}`);
            }
          }
          const ar = JSON.parse(fs.readFileSync('messages/ar.json', 'utf8'));
          const expectedAr = {
            password_mismatch: 'كلمتا المرور غير متطابقتين',
            password_length: 'كلمة المرور يجب أن تحتوي على 8 أحرف على الأقل',
            password_letter: 'كلمة المرور يجب أن تحتوي على حرف واحد على الأقل',
            password_number: 'كلمة المرور يجب أن تحتوي على رقم واحد على الأقل',
          };
          for (const [key, value] of Object.entries(expectedAr)) {
            if (ar.Auth.errors[key] !== value) throw new Error(`Arabic ${key} mismatch`);
          }
          if (/\?{4,}/.test(fs.readFileSync('messages/ar.json', 'utf8'))) {
            throw new Error('Arabic locale still contains hardcoded ???? text');
          }
          NODE
      - name: Install dependencies
        run: npm ci
      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
        run: npm run build
      - name: Commit fix and remove temporary workflow
        run: |
          rm -f .github/workflows/codex-password-validation-fix.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- lib/validations/community.ts 'app/[locale]/(auth)/register/register-form.tsx' messages/ar.json messages/fr.json messages/en.json messages/ff.json messages/snk.json messages/wo.json .github/workflows/codex-password-validation-fix.yml
          git diff --cached --check
          git commit -m 'fix: localize register password validation'
          git push
